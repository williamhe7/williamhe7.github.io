<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chinese Handwriting Recognition</title>
  <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
  <style>
    body { 
      font-family: Arial, sans-serif; 
      margin: 20px; 
      text-align: center; 
    }
    canvas { 
      border: 3px solid #333; 
      background: white; 
      margin: 15px; 
    }
    #result { 
      font-size: 2em; 
      margin: 20px; 
      min-height: 80px; 
    }
    #status { 
      color: #666; 
      margin: 10px; 
    }
  </style>
</head>
<body>
  <h1>Chinese Handwriting Recognition</h1>
  
  <input type="file" id="fileInput" accept="image/*"><br><br>
  <canvas id="canvas" width="400" height="400"></canvas>
  
  <div id="status">Loading character table...</div>
  <div id="result">Prediction: <strong>-</strong><br>Confidence: -</div>

  <script type="module">
    import * as ort from 'https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.mjs';

    let session = null;
    let charTable = {};        // Will be populated from CSV
    const targetSize = 64;
    const HF_REPO = "williamhehe/ChineseHandwritingAnalyzer";   // ← CHANGE THIS

    // Load character table dynamically from Hugging Face
    async function loadCharTable() {
      try {
        const url = `https://huggingface.co/${HF_REPO}/resolve/main/table.csv`;
        const response = await fetch(url);
        
        if (!response.ok) throw new Error("Failed to load table.csv");

        const text = await response.text();
        const lines = text.trim().split("\n");

        lines.slice(1).forEach(line => {   // skip header
          if (line.trim() === "") return;
          const [idxStr, ...charParts] = line.split(",");
          const idx = parseInt(idxStr.trim());
          const character = charParts.join(",").trim();   // handles commas in character names if any
          if (!isNaN(idx)) {
            charTable[idx] = character;
          }
        });

        document.getElementById("status").textContent = `✅ Loaded ${Object.keys(charTable).length} characters`;
        console.log(`✅ Loaded ${Object.keys(charTable).length} characters from char_table.csv`);
      } catch (err) {
        console.error("Failed to load character table:", err);
        document.getElementById("status").innerHTML = 
          `❌ Failed to load char_table.csv<br>Please make sure it's uploaded to your HF repo`;
      }
    }

    async function loadModel() {
      try {
        const modelUrl = `https://huggingface.co/${HF_REPO}/resolve/main/model/model.onnx`;
        session = await ort.InferenceSession.create(modelUrl, {
          executionProviders: ["wasm"]
        });
        console.log("✅ ONNX model loaded");
      } catch (err) {
        console.error("Model load failed:", err);
      }
    }

    // Exact preprocessing (matches your Python code)
    async function preprocessImage(file) {
      const img = new Image();
      img.src = URL.createObjectURL(file);
      await new Promise(r => img.onload = r);

      const displayCanvas = document.getElementById("canvas");
      const ctx = displayCanvas.getContext("2d");
      ctx.drawImage(img, 0, 0, displayCanvas.width, displayCanvas.height);

      // 64x64 working canvas
      const workCanvas = document.createElement("canvas");
      workCanvas.width = workCanvas.height = targetSize;
      const wctx = workCanvas.getContext("2d");

      wctx.fillStyle = "#FFFFFF";  // white padding
      wctx.fillRect(0, 0, targetSize, targetSize);

      const scale = Math.min(targetSize / img.width, targetSize / img.height);
      const newW = Math.floor(img.width * scale);
      const newH = Math.floor(img.height * scale);
      const offsetX = Math.floor((targetSize - newW) / 2);
      const offsetY = Math.floor((targetSize - newH) / 2);

      wctx.drawImage(img, offsetX, offsetY, newW, newH);

      const imageData = wctx.getImageData(0, 0, targetSize, targetSize);
      const data = imageData.data;

      let gray = new Float32Array(targetSize * targetSize);
      for (let i = 0; i < data.length; i += 4) {
        const grayVal = 0.299 * data[i] + 0.587 * data[i + 1] + 0.114 * data[i + 2];
        gray[i / 4] = grayVal < 180 ? 0 : 255;   // binary threshold
      }

      // Normalize to [0.0, 1.0]
      for (let i = 0; i < gray.length; i++) {
        gray[i] /= 255.0;
      }

      return new ort.Tensor("float32", gray, [1, 1, targetSize, targetSize]);
    }

    function softmax(logits) {
      const max = Math.max(...logits);
      const exps = logits.map(x => Math.exp(x - max));
      const sum = exps.reduce((a, b) => a + b, 0);
      return exps.map(x => x / sum);
    }

    async function runInference(file) {
      if (!session) await loadModel();
      if (Object.keys(charTable).length === 0) {
        document.getElementById("result").innerHTML = "Waiting for character table to load...";
        return;
      }

      const inputTensor = await preprocessImage(file);
      const results = await session.run({ "input": inputTensor });
      
      const logits = Array.from(results.output.data);
      const probs = softmax(logits);

      let maxProb = 0;
      let predIdx = 0;

      for (let i = 0; i < probs.length; i++) {
        if (probs[i] > maxProb) {
          maxProb = probs[i];
          predIdx = i;
        }
      }

      const character = charTable[predIdx] || `Unknown (${predIdx})`;
      const confidence = (maxProb * 100).toFixed(1) + "%";

      document.getElementById("result").innerHTML = 
        `Prediction: <strong>${character}</strong><br>Confidence: ${confidence}`;
    }

    // Event listener
    document.getElementById("fileInput").addEventListener("change", (e) => {
      if (e.target.files.length > 0) {
        runInference(e.target.files[0]);
      }
    });

    // Initialize everything
    async function init() {
      await loadCharTable();
      await loadModel();
    }

    init();
  </script>
</body>
</html>
