<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CN Handwriting Recognition</title>
  <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
  <style> body { font-family: Arial; } canvas { border: 1px solid #000; } </style>
</head>
<body>
  <h1>Chinese Handwriting Recognition (in Browser)</h1>
  <input type="file" id="fileInput" accept="image/*">
  <br><br>
  <canvas id="canvas" width="300" height="300"></canvas>
  <p>Prediction: <strong id="result">-</strong></p>

  <script type="module">
    import * as ort from 'https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.mjs';

    let session;
    const targetSize = 64;

    async function loadModel() {
      session = await ort.InferenceSession.create(
        'https://huggingface.co/yourusername/cn-handwriting-model/resolve/main/model.onnx',
        { executionProviders: ['wasm'] }   // change to 'webgpu' if supported and you want speed
      );
      console.log("Model loaded successfully");
    }

    // Exact replica of your Python preprocessing in JavaScript
    async function preprocessImage(file) {
      const img = new Image();
      img.src = URL.createObjectURL(file);
      await new Promise(r => img.onload = r);

      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d', { willReadFrequently: true });

      // Step 1: Draw original image
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      let imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      let data = imageData.data;

      // Convert to grayscale
      let gray = new Uint8Array(canvas.width * canvas.height);
      for (let i = 0; i < data.length; i += 4) {
        gray[i/4] = 0.299 * data[i] + 0.587 * data[i+1] + 0.114 * data[i+2];  // luminance
      }

      // Step 2: Resize and pad to 64x64 with white padding (value=255)
      const tempCanvas = document.createElement('canvas');
      tempCanvas.width = targetSize;
      tempCanvas.height = targetSize;
      const tctx = tempCanvas.getContext('2d');
      tctx.fillStyle = '#FFFFFF';           // white background
      tctx.fillRect(0, 0, targetSize, targetSize);

      const scale = Math.min(targetSize / canvas.width, targetSize / canvas.height);
      const newW = Math.floor(canvas.width * scale);
      const newH = Math.floor(canvas.height * scale);
      const offsetX = Math.floor((targetSize - newW) / 2);
      const offsetY = Math.floor((targetSize - newH) / 2);

      tctx.drawImage(img, offsetX, offsetY, newW, newH);   // resize with aspect ratio

      // Get the padded grayscale data
      let paddedData = tctx.getImageData(0, 0, targetSize, targetSize).data;
      let grayPadded = new Float32Array(targetSize * targetSize);

      for (let i = 0; i < paddedData.length; i += 4) {
        grayPadded[i/4] = paddedData[i];   // R channel (grayscale)
      }

      // Step 3: Simple threshold (approximating Otsu — you can improve this)
      // For better Otsu in JS it's complex; many people use a fixed threshold like 200 or adaptive.
      // For now: simple threshold
      for (let i = 0; i < grayPadded.length; i++) {
        grayPadded[i] = grayPadded[i] < 200 ? 0 : 255;   // adjust threshold if needed
      }

      // Step 4: Normalize to 0.0 - 1.0  (black=0, white=1 ? Wait — check your training!)
      // In your code: after threshold, / 255.0  → so black ink = 0, white bg = 1
      for (let i = 0; i < grayPadded.length; i++) {
        grayPadded[i] = grayPadded[i] / 255.0;
      }

      // Final tensor: [1, 1, 64, 64]
      return new ort.Tensor('float32', grayPadded, [1, 1, targetSize, targetSize]);
    }

    async function runInference(file) {
      if (!session) await loadModel();

      const inputTensor = await preprocessImage(file);
      const feeds = { "input": inputTensor };

      const results = await session.run(feeds);
      const output = results.output.data;   // or results["output"] depending on name

      // TODO: Decode your output to Chinese character
      // Example if it's classification: argmax
      let maxIdx = 0;
      let maxProb = output[0];
      for (let i = 1; i < output.length; i++) {
        if (output[i] > maxProb) {
          maxProb = output[i];
          maxIdx = i;
        }
      }
      document.getElementById('result').textContent = `Class ${maxIdx} (prob: ${maxProb.toFixed(3)})`;
      // Replace with your actual label mapping (e.g. Chinese characters)
    }

    document.getElementById('fileInput').addEventListener('change', (e) => {
      if (e.target.files.length > 0) {
        runInference(e.target.files[0]);
      }
    });

    // Load model on page start
    loadModel();
  </script>
</body>
</html>
